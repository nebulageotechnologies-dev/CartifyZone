
<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#670a7aed,#de25eb);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial,sans-serif;
        }

        .form-card{
            background:white;
            padding:40px;
            border-radius:20px;
            width:450px;
            box-shadow:0 15px 30px rgba(0,0,0,0.2);
        }

        .form-card h2{
            text-align:center;
            margin-bottom:25px;
            color:#2563eb;
            font-weight:700;
        }

        .btn-success{
            width:100%;
        }

        .login-link{
            text-align:center;
            margin-top:15px;
        }
    </style>
</head>

<body>

<div class="form-card">

    <h2>📝 Register</h2>

    {% if error %}
        <div class="alert alert-danger">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input type="text"
               name="username"
               class="form-control mb-3"
               placeholder="Username"
               required>

        <input type="email"
               name="email"
               class="form-control mb-3"
               placeholder="Email"
               required>

        <input type="password"
               name="password"
               class="form-control mb-3"
               placeholder="Password"
               required>

        <button type="submit"
                class="btn btn-success">
            Register
        </button>

    </form>

    <div class="login-link">
        Already have an account?
        <a href="/login/">Login</a>
    </div>

</div>

</body>
</html>
