<!DOCTYPE html>
<html>
<head>
    <title>My Orders</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

  body{
    background: linear-gradient(135deg,#4c1d95,#e825eb,#3aedcf);
}
        min-height:100vh;
        font-family:Arial,sans-serif;
    }

    .orders-container{
        max-width:900px;
        margin:50px auto;
        padding:20px;
    }

    .page-title{
        color:white;
        text-align:center;
        font-size:42px;
        font-weight:700;
        margin-bottom:35px;
    }

    .order-card{
        background:white;
        border-radius:18px;
        padding:25px;
        margin-bottom:25px;
        border-left:6px solid #0d6efd;
        box-shadow:0 10px 25px rgba(0,0,0,.15);
        transition:all .3s ease;
    }

    .order-card:hover{
        transform:translateY(-6px);
        box-shadow:0 15px 35px rgba(0,0,0,.25);
    }

    .order-id{
        color:#0d6efd;
        font-weight:700;
        margin-bottom:15px;
    }

    .order-name{
        font-size:18px;
        color:#333;
    }

    .total{
        color:#16a34a;
        font-size:24px;
        font-weight:700;
        margin-top:10px;
    }

    .home-btn{
        display:inline-block;
        padding:12px 30px;
        background:#0d6efd;
        color:white;
        text-decoration:none;
        border-radius:10px;
        font-weight:600;
    }

    .home-btn:hover{
        background:#0b5ed7;
        color:white;
    }

    .empty-card{
        background:white;
        border-radius:15px;
        padding:30px;
        text-align:center;
        box-shadow:0 10px 25px rgba(0,0,0,.15);
    }

    </style>

</head>
<body>

<div class="orders-container">

    <h1 class="page-title">📦 My Orders</h1>

    {% for order in orders %}

    <div class="order-card">

        <h3 class="order-id">
            Order #{{ order.id }}
        </h3>
        <p class="order-name">
            <strong>Customer:</strong>
            {{ order.customer_name }}
        </p>

        <p>
            <strong>Phone:</strong>
            {{ order.phone }}
        </p>

        <p>
            <strong>Address:</strong>
            {{ order.address }}
        </p>

        <p class="total">
            ₹{{ order.total_amount }}
        </p>

    <a href="{% url 'delete_order' order.id %}" class="home-btn" style="background:#dc3545; margin-bottom:15px;">
            🗑️ Cancel Order
        </a>
    </div>
    {% empty %}

    <div class="empty-card">
        <h3>No Orders Found</h3>
        <p>You haven't placed any orders yet.</p>
    </div>

    {% endfor %}

    <div class="text-center mt-4">
        <a href="/home/" class="home-btn">
            🏠 Back Home
        </a>
    </div>

</div>

</body>
</html>
